<!DOCTYPE html>

<html>
    <head>
        <!-- Inter Google Font -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="index.css">
    </head>
    <body>
        <nav>
            <input type="color" class="color-picker" id="color-picker">
            <select class="mode-select" id="mode-select">
                <option value="monochrome">Monochrome</option>
                <option value="monochrome-dark">Monochrome-dark</option>
                <option value="monochrome-light">Monochrome-light</option>
                <option value="analogic">Analogic</option>
                <option value="complement">Complement</option>
                <option value="analogic-complement">Analogic-complement</option>
                <option value="triad">Triad</option>
                <option value="quad">Quad</option>
            </select>
            <button class="generate-btn" id="generate-btn">Get color scheme</button>
        </nav>
        <div class="color-scheme" id="color-scheme">
            <div class="color-1"></div>
            <div class="color-2"></div>
            <div class="color-3"></div>
            <div class="color-4"></div>
            <div class="color-5"></div>
            <div class="hex-text hex-1 copyable">#F55A5A</div>
            <div class="hex-text hex-2 copyable">#2B283A</div>
            <div class="hex-text hex-3 copyable">#FBF3AB</div>
            <div class="hex-text hex-4 copyable">#AAD1B6</div>
            <div class="hex-text hex-5 copyable">#A626D3</div>
        </div>
        <script src="index.js"></script>
    </body>
</html>
